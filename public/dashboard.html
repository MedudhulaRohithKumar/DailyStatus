<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Daily Status | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="dashboard-body">
    <!-- Navbar -->
    <nav class="glass-navbar">
        <div class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
            <span class="brand-text">Daily Status</span>
        </div>
        <div class="nav-user">
            <span id="user-display-name"></span>
            <button class="btn-subtle" id="logout-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-container">

        <!-- Controls Header -->
        <header class="dashboard-header">
            <div>
                <h1 class="page-title">Team Status Overview</h1>
                <p class="page-subtitle">View and update daily updates for the entire DevOps team.</p>
            </div>

            <div class="controls-row">
                <div class="date-picker-wrapper">
                    <label for="date-selector">Select Date</label>
                    <input type="date" id="date-selector" class="glass-input">
                </div>
                <button class="btn-primary" id="open-modal-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Update My Status
                </button>
            </div>
        </header>

        <!-- Status Table Card -->
        <div class="glass-card table-card">
            <div class="table-responsive">
                <table class="status-table" id="status-table">
                    <thead>
                        <tr>
                            <th>Team Member</th>
                            <th>Status</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody id="status-table-body">
                        <!-- Dynamic content injected here via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Loading Indicator -->
            <div class="loader-container" id="table-loader">
                <div class="spinner"></div>
            </div>
            <!-- Error State -->
            <div class="empty-state hidden" id="table-error">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01" />
                </svg>
                <p>Failed to load data. Please try again.</p>
            </div>
        </div>
    </main>

    <!-- Update Status Modal -->
    <div class="modal-overlay hidden" id="status-modal">
        <div class="glass-modal">
            <div class="modal-header">
                <h2>Update Status</h2>
                <button class="close-btn" id="close-modal-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="status-form">
                <!-- Date readonly to current selection -->
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="modal-date" disabled class="glass-input disabled">
                </div>

                <div class="input-group">
                    <label for="status-type">Status Type</label>
                    <select id="status-type" class="glass-select" required>
                        <option value="Worked On" selected>Worked On</option>
                        <option value="Leave">Leave</option>
                        <option value="WFO Exception">WFO Exception</option>
                    </select>
                </div>

                <div class="input-group" id="description-group">
                    <label for="status-desc">Description of Work</label>
                    <textarea id="status-desc" rows="4" placeholder="What did you work on today?" class="glass-textarea"
                        required></textarea>
                </div>

                <div id="submit-error" class="error-text"></div>

                <div class="modal-actions">
                    <button type="button" class="btn-subtle" id="cancel-modal-btn">Cancel</button>
                    <button type="submit" class="btn-primary" id="save-status-btn">Save Status</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
