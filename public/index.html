<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Daily Status | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-card login-card">
            <div class="brand-header">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <h1>Daily Status</h1>
                <p>DevOps Team tracker</p>
            </div>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div id="login-error" class="error-text"></div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span>Sign In</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <div class="auth-links">
                    <a href="#" id="show-register">Create an account</a>
                    <a href="#" id="show-reset">Forgot password?</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="input-group">
                    <label for="reg-fullname">Full Name</label>
                    <input type="text" id="reg-fullname" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required>
                </div>
                <div id="register-error" class="error-text"></div>
                <div id="register-success" class="success-text" style="color: #10b981; margin-bottom: 1rem; font-size: 0.875rem;"></div>
                <button type="submit" class="btn-primary" id="register-btn">
                    <span>Register</span>
                </button>
                <div class="auth-links" style="margin-top: 1rem; text-align: center;">
                    <a href="#" id="show-login-from-reg">Back to Login</a>
                </div>
            </form>

            <!-- Reset Password Form -->
            <form id="reset-form" class="hidden">
                <p style="margin-bottom: 1rem; color: #9ca3af; font-size: 0.875rem;">Enter your username and a new password to reset.</p>
                <div class="input-group">
                    <label for="reset-username">Username</label>
                    <input type="text" id="reset-username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="reset-password">New Password</label>
                    <input type="password" id="reset-password" placeholder="Create a new password" required>
                </div>
                <div id="reset-error" class="error-text"></div>
                <div id="reset-success" class="success-text" style="color: #10b981; margin-bottom: 1rem; font-size: 0.875rem;"></div>
                <button type="submit" class="btn-primary" id="reset-btn">
                    <span>Reset Password</span>
                </button>
                <div class="auth-links" style="margin-top: 1rem; text-align: center;">
                    <a href="#" id="show-login-from-reset">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
